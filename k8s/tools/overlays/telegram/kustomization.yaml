apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

patches:
  - path: patches/add-token-env.yaml

namePrefix: telegram-
labels:
  - pairs:
      app: telegram-api-service
    includeSelectors: true

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: tool-code
    files:
      - index.mjs
      - package.json
