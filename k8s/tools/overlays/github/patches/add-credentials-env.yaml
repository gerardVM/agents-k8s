apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
spec:
  template:
    spec:
      containers:
        - name: api
          env:
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: githubAppID
                  optional: true
            - name: GITHUB_APP_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: githubAppInstallationID
                  optional: true
            - name: GITHUB_APP_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: githubAppPrivateKey
                  optional: true
