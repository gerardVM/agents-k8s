apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

patches:
  - path: patches/add-credentials-env.yaml

namePrefix: github-
labels:
  - pairs:
      app: github-api-service
    includeSelectors: true

generatorOptions: {}

configMapGenerator:
  - name: tool-code
    files:
      - index.mjs
      - package.json
