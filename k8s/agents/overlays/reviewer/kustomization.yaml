apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: reviewer-agent
resources:
  - namespace.yaml
  - ../../base
  - ../../../tools/overlays/telegram
  - ../../../tools/overlays/github

generatorOptions: {}

configMapGenerator:
  - name: openclaw-workspace
    files:
      - workspace/AGENTS.md
      - workspace/LEARNINGS.md
      - workspace/HEARTBEAT.md
      - workspace/IDENTITY.md
      - workspace/SOUL.md
      - workspace/TOOLS.md
      - workspace/USER.md
