apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openclaw
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-config
          image: busybox:1.37
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /home/node/.openclaw/workspace
              cp /config/openclaw.json /home/node/.openclaw/openclaw.json
              rm -f /home/node/.openclaw/openclaw.json.last-good \
                    /home/node/.openclaw/openclaw.json.clobbered.* \
                    /home/node/.openclaw/openclaw.json.bak*
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          resources:
            requests:
              memory: 32Mi
              # cpu: 50m
            limits:
              memory: 64Mi
              cpu: 100m
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /config
              readOnly: true
      containers:
        - name: gateway
          image: ghcr.io/openclaw/openclaw:2026.4.23
          imagePullPolicy: IfNotPresent
          command:
            - node
            - /app/dist/index.js
            - gateway
            - run
          ports:
            - name: gateway
              containerPort: 18789
              protocol: TCP
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: NODE_ENV
              value: production
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENCLAW_GATEWAY_TOKEN
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: GEMINI_API_KEY
                  optional: true
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: OPENROUTER_API_KEY
                  optional: true
            - name: DEEPSEEK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openclaw-secrets
                  key: DEEPSEEK_API_KEY
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              value: KEEP
          resources:
            requests:
              memory: 512Mi
              # cpu: 250m
            limits:
              memory: 2Gi
              cpu: "2"
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - "require('http').get('http://127.0.0.1:18789/readyz', r => process.exit(r.statusCode < 400 ? 0 : 1)).on('error', () => process.exit(1))"
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: openclaw-data
              mountPath: /home/node/.openclaw
            - name: workspace
              mountPath: /home/node/.openclaw/workspace/AGENTS.md
              subPath: AGENTS.md
              readOnly: true
            - name: workspace
              mountPath: /home/node/.openclaw/workspace/LEARNINGS.md
              subPath: LEARNINGS.md
              readOnly: true
            - name: workspace
              mountPath: /home/node/.openclaw/workspace/HEARTBEAT.md
              subPath: HEARTBEAT.md
              readOnly: true
            - name: workspace
              mountPath: /home/node/.openclaw/workspace/IDENTITY.md
              subPath: IDENTITY.md
              readOnly: true
            - name: workspace
              mountPath: /home/node/.openclaw/workspace/SOUL.md
              subPath: SOUL.md
              readOnly: true
            - name: workspace
              mountPath: /home/node/.openclaw/workspace/TOOLS.md
              subPath: TOOLS.md
              readOnly: true
            - name: workspace
              mountPath: /home/node/.openclaw/workspace/USER.md
              subPath: USER.md
              readOnly: true
            - name: tmp-volume
              mountPath: /tmp
            - name: npm-cache
              mountPath: /home/node/.npm
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: openclaw-data
          persistentVolumeClaim:
            claimName: openclaw-data
        - name: config
          configMap:
            name: openclaw-config
        - name: workspace
          configMap:
            name: openclaw-workspace
        - name: npm-cache
          emptyDir: {}
        - name: tmp-volume
          emptyDir: {}